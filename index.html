<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teleprompter Docs | Premium</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="liquid-bg"></div>
    
    <!-- Header Global -->
    <header class="global-header">
        <div class="logo-container">DECAPOD<span class="logo-dot">.</span></div>
        <div class="header-right">
            <div class="header-search">
                <input type="text" id="client-search-input" placeholder="Pesquisar..." class="glass-input-compact">
            </div>
            <button id="delete-mode-btn" class="btn-icon" title="Excluir">&#x1F5D1;</button>
            <button class="header-settings-btn btn-icon" title="Configurações">&#x2699;</button>
        </div>
    </header>

    <!-- Telas de Dashboard (Fora do App Container para evitar desvios de alinhamento) -->
    <div id="clients-screen-dashboard" class="dashboard-screen">
        <header class="centered-header">
            <h1>MEUS CLIENTES</h1>
            <p class="subtitle">Selecione um perfil para gerenciar roteiros e gravações.</p>
        </header>
        <div id="clients-grid" class="clients-grid">
            <!-- Cards de clientes aqui -->
        </div>
    </div>

    <div id="projects-screen" class="dashboard-screen hidden">
        <header class="centered-header">
            <button id="back-to-clients" class="btn-glass">Voltar</button>
            <h1 id="current-client-name">NOME DO CLIENTE</h1>
            <p class="subtitle">Gerencie seus roteiros e projetos de gravação.</p>
        </header>
        <div class="projects-container">
            <div id="projects-list" class="projects-grid">
                <!-- Cards de projetos aqui -->
            </div>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <!-- Sidebar para Clientes -->
        <nav id="sidebar">
            <div class="sidebar-header">
                <h3>DKPROD.</h3>
                <button id="add-client-btn" title="Novo Cliente">+</button>
            </div>
            <div id="clients-list">
                <!-- Clientes inseridos aqui -->
            </div>
        </nav>

        <!-- Área Principal (Editor/Prompter Setup) -->
        <main id="main-content">
            <!-- Editor estilo Google Docs -->
            <div id="controls-panel" class="hidden">
                <div class="editor-toolbar">
                    <button id="back-to-projects" class="btn secondary" title="Sair do Documento">Voltar</button>
                    <input type="text" id="project-title-input" class="doc-title" value="Título do Roteiro">
                    
                    <div class="toolbar-actions">
                        <div class="toolbar-group">
                            <label>Velocidade</label>
                            <input type="range" id="speed-slider" min="1" max="100" value="30">
                            <span id="speed-val" class="value-badge">30</span>
                        </div>
                        <div class="toolbar-group">
                            <label>Fonte</label>
                            <input type="range" id="font-size-slider" min="20" max="200" value="60">
                            <span id="font-size-val" class="value-badge">60</span>
                        </div>
                        <div class="toolbar-group">
                            <label>Espaçamento</label>
                            <input type="range" id="line-spacing-slider" min="10" max="50" value="15">
                            <span id="line-spacing-val" class="value-badge">15</span>
                        </div>
                    </div>

                    <button id="start-btn" class="btn primary">Apresentar</button>
                </div>
                
                <div class="editor-canvas">
                    <div class="paper">
                        <textarea id="text-input" placeholder="Comece a escrever seu roteiro..."></textarea>
                    </div>
                </div>
            </div>
        </main>
        
        <!-- Footer Global -->
        <footer id="main-footer">
            <a class="footer-link">Gerenciar Assinaturas</a>
            <a class="footer-link">Suporte</a>
        </footer>
    </div>

    <div id="prompter-screen" class="hidden">
        <div class="prompter-watermark"></div>
        <div id="scroll-container" style="width: 100%; display: flex; justify-content: center; will-change: transform;">
            <div id="prompter-text"></div>
        </div>
        <!-- Botão Flutuante com Círculo -->
        <div id="prompter-menu-btn">
            <div class="circle-icon"></div>
        </div>

        <!-- Menu de Opções -->
        <div id="prompter-overlay-menu">
            <button id="menu-play-pause" class="menu-item" title="Play/Pause">&#x25B6;</button>
            <button id="menu-restart" class="menu-item" title="Reiniciar">&#x21BB;</button>
            <button id="menu-stop" class="menu-item danger" title="Fechar">&#x2715;</button>
        </div>

    </div>

    <!-- Modal Customizado -->
    <div id="custom-modal" class="modal-overlay hidden">
        <div class="glass-modal">
            <h2 id="modal-title">Novo Cliente</h2>
            <div class="modal-content">
                <input type="text" id="modal-input" class="doc-title" placeholder="Digite aqui...">
                <p id="modal-message" class="hidden"></p>
            </div>
            <div class="modal-actions">
                <button id="modal-cancel" class="btn secondary">Cancelar</button>
                <button id="modal-confirm" class="btn primary">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
